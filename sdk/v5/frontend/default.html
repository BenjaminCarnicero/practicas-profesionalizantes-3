<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Laboratorio: Autenticación y Autorización</title>

       <!-- Fuentes e Iconos de assets -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
        <link rel="stylesheet" href="./assets/icons/font-awesome-4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="./assets/css/w3pro-4.13.css">
        <link rel="stylesheet" href="./assets/css/w3-theme.css">
        <link rel="stylesheet" href="./assets/css/admin-styles.css">
        
        <!-- 2. Estilos específicos para centrar el login y registro -->
        <style>
            /* Contenedor principal centrado en pantalla */
            .main-container {
                max-width: 1000px; 
                margin: 0 auto;
                padding: 0 16px;  
            }

            .login-wrapper {
                max-width: 450px;
                margin: 0 auto 32px auto;
            }

           
            .register-wrapper {
                width: 100%;
                margin-bottom: 32px;
            }
        </style>

        >
        <script src="./components.js" defer></script>
    </head>
    <body>

        
        <div class="main-container">

            <!-- Tarjeta de Login-->
            <div class="login-wrapper">
                <wc-login-form-view id="loginComponent"></wc-login-form-view>
            </div>

            <!-- Formulario de Registro -->
            <div class="register-wrapper">
                <wc-register-form-view></wc-register-form-view>
            </div>

            <div>
                <span class="custom-badge" style="background-color: #2bba5c; color: white;">CONSIGNA 1 (DB)</span>
                <h2>Consumo de Endpoints Protegidos</h2>
                <p>Probando accesos simulando el usuario actual en la URL.</p>

                <button id="btnLog" class="panel-btn">Ejecutar /log (Permitido)</button>
                <button id="btnHello" class="panel-btn">Ejecutar /sayHello (Denegado)</button>

                <div id="txtResultado">Consola de respuestas del servidor...</div>
            </div>

        </div>
        

    </body>

    <script>
        // Función auxiliar para actualizar el panel de respuestas de forma linda
        function mostrarMensaje(status, texto) {
            txtResultado.innerText = texto;
            txtResultado.style.color = "white";
            if (status === 200) {
                txtResultado.style.backgroundColor = "#2bba5c"; // Verde exito
            } else if (status === 401) {
                txtResultado.style.backgroundColor = "#ff9800"; // Naranja no autenticado
            } else if (status === 403) {
                txtResultado.style.backgroundColor = "#e03b3b"; // Rojo denegado
            } else {
                txtResultado.style.backgroundColor = "#6c757d"; // Gris error de red
            }
        }

        // Función para obtener el input de usuario desde adentro del WebComponent
        function obtenerUsuarioActual() {
            const loginComp = document.getElementById('loginComponent');
            if (loginComp && loginComp.usernameInput) {
                return loginComp.usernameInput.value;
            }
            return '';
        }

        // Función para obtener la contrasenia desde adentro del WebComponent
        function obtenerPasswordActual() {
            const loginComp = document.getElementById('loginComponent');
            if (loginComp && loginComp.passwordInput) {
                return loginComp.passwordInput.value;
            }
            return '';
        }

        async function RPCWebAPIFetch(name, content) {
            const usuarioActual = obtenerUsuarioActual(); // Obtenido de forma segura desde el componente

            const response = await fetch(`http://localhost:3000${name}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Version': '1.0',
                    'x-user-id': usuarioActual,
                    'x-api-key': 'clave_de_acceso'
                },
                body: JSON.stringify(content)
            });

            // respuesta JSON del servidor
            const data = await response.json();

            // Si es exitoso (categoría 200), devuelve los datos directo
            if (response.status === 200) {
                return data;
            }

            // A excepción de 200, lanzamos excepciones personalizadas con la data del servidor
            const errorPayload = {
                status: response.status,
                exception: data.exception || 'ErrorException',
                detail: data.detail || data.error || 'Ocurrió un error inesperado.'
            };

            throw errorPayload;
        }

        // Controlador de login refactorizado usando RPCWebAPIFetch
        async function ejecutarLogin() {
            const username = obtenerUsuarioActual();
            const password = obtenerPasswordActual();

            mostrarMensaje(0, "Enviando credenciales...");

            try {
                // Pasamos la ruta '/login' y los datos en el content
                const data = await RPCWebAPIFetch('/login', { username, password });
                mostrarMensaje(200, `[200 OK] ¡Sesión creada en memoria para '${data.username}' (Estado: ${data.status})!`);
            } catch (err) {
                // Captura el objeto lanzado por la excepción de RPCWebAPIFetch
                mostrarMensaje(err.status || 401, `[Error] No se pudo iniciar sesión. Detalle: ${err.detail || 'Credenciales incorrectas'}`);
            }
        }

        // Para que el componente la encuentre en el objeto global "window"
        window.ejecutarLogin = ejecutarLogin;

        // Controlador de peticiones refactorizado con RPCWebAPIFetch
        async function consultarEndpoint(endpoint) {
            const usuarioActual = obtenerUsuarioActual(); 

            mostrarMensaje(0, `Ejecutando procedimiento ${endpoint} como '${usuarioActual}'...`);

            try {
                const data = await RPCWebAPIFetch(endpoint, {});
                mostrarMensaje(200, `[200 OK] Éxito: ${data.message}`);
            } catch (err) {
                // Si falla (cualquier status que no sea 200), manejo de las excepciones
                if (err.status === 401) {
                    mostrarMensaje(401, `[401 Bloqueado por memoria] Excepción: ${err.exception}. Detalle: ${err.detail}`);
                } else if (err.status === 403) {
                    mostrarMensaje(403, `[403 Bloqueado por base de datos] Excepción: ${err.exception}. Detalle: ${err.detail}`);
                } else {
                    mostrarMensaje(err.status || 500, `[Error ${err.status}] Excepción: ${err.exception}. Detalle: ${err.detail}`);
                }
            }
        }

        function main() {
            btnLog.onclick = consultarEndpoint.bind(null, '/log');
            btnHello.onclick = consultarEndpoint.bind(null, '/sayHello');
        }

        window.onload = main;
    </script>
</html>

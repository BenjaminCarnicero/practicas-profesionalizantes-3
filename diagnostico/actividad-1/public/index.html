<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planta de Reciclaje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sistema de Stock: Planta de Reciclaje</h1>
    </header>

    <main class="container">
        
        <section class="card">
            <h2>Inventario Actual</h2>
            <div class="table-wrapper">
                <table id="tabla-stock">
                    <thead>
                        <tr>
                            <th>Material</th>
                            <th>Cantidad</th>
                            <th>Unidad</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        <tr>
                            <td colspan="4" class="text-center">Cargando datos del servidor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Registrar Operación</h2>
            <form id="form-movimiento" class="form-grid">
                <div class="form-group">
                    <label for="select-material">Material</label>
                    <select id="select-material" required>
                        <option value="">Seleccione...</option>
                        </select>
                </div>

                <div class="form-group">
                    <label for="input-cantidad">Cantidad</label>
                    <input type="number" id="input-cantidad" step="0.01" min="0.01" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label>Acciones</label>
                    <div class="btn-group">
                        <button id="btn-comprar" class="btn btn-buy">Comprar (+)</button>
                        <button id="btn-vender" class="btn btn-sell">Vender (-)</button>
                    </div>
                </div>
            </form>
        </section>

    </main>

    <footer>
        <p>Planta de reciclaje</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
